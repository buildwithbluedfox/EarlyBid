<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Aurora Hero</title>
    <style>
        :root {
            --bg-dark: #030508;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            overflow: hidden;
            color: var(--text-color);
        }

        #hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Film Grain Overlay */
        .grain-overlay {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 2;
            pointer-events: none;
            /* SVG noise filter for a premium film grain look */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.08;
            mix-blend-mode: overlay;
            animation: grain 8s steps(10) infinite;
        }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -10%); }
            20% { transform: translate(-15%, 5%); }
            30% { transform: translate(7%, -25%); }
            40% { transform: translate(-5%, 25%); }
            50% { transform: translate(-15%, 10%); }
            60% { transform: translate(15%, 0%); }
            70% { transform: translate(0%, 15%); }
            80% { transform: translate(3%, 35%); }
            90% { transform: translate(-10%, 10%); }
        }

        /* Central Content */
        .content {
            position: relative;
            z-index: 3;
            text-align: center;
            max-width: 800px;
            padding: 0 2rem;
            pointer-events: none; /* Allows mouse events to reach the canvas */
        }

        .content h1 {
            font-size: clamp(3rem, 6vw, 6rem);
            font-weight: 300;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            opacity: 0.95;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .content p {
            font-size: clamp(1.1rem, 1.5vw, 1.35rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            max-width: 500px;
            margin: 0 auto;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

    </style>
</head>
<body>

    <section id="hero">
        <canvas id="bg-canvas"></canvas>
        <div class="grain-overlay"></div>
        
        <div class="content" id="text-content">
            <h1>Elevate Your Vision</h1>
            <p>Experience a seamless blend of art and technology resting over a dynamic, breathing aura.</p>
        </div>
    </section>

    <!-- GSAP loaded via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        const textContent = document.getElementById('text-content');

        let width, height;
        let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let targetMouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

        // Define our liquid blobs
        // rColor, gColor, bColor define the RGB channels. aBase is the center opacity.
        const blobs = [
            // Ambient deep royal blue blobs
            { x: 0, y: 0, r: 0, rColor: 0, gColor: 57, bColor: 115, aBase: 0.8 },
            { x: 0, y: 0, r: 0, rColor: 27, gColor: 103, bColor: 179, aBase: 0.7 },
            { x: 0, y: 0, r: 0, rColor: 10, gColor: 30, bColor: 90, aBase: 0.9 },
            // Vibrant cyan/blue follower
            { x: 0, y: 0, r: 0, rColor: 0, gColor: 120, bColor: 255, aBase: 0.5 },
            // Soft white/bright glow follower
            { x: 0, y: 0, r: 0, rColor: 255, gColor: 255, bColor: 255, aBase: 0.15 }
        ];

        function init() {
            resize();
            window.addEventListener('resize', resize);
            window.addEventListener('mousemove', onMouseMove);

            // Initial positions spread across the screen
            blobs[0].x = width * 0.3; blobs[0].y = height * 0.4; 
            blobs[1].x = width * 0.7; blobs[1].y = height * 0.6; 
            blobs[2].x = width * 0.5; blobs[2].y = height * 0.5; 
            
            // Start ambient animations for the first three blobs
            animateAmbient(blobs[0], 0.4);
            animateAmbient(blobs[1], 0.5);
            animateAmbient(blobs[2], 0.3);

            // Tie GSAP's ticker to our render function
            gsap.ticker.add(render);
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            // Scale radii based on screen size for responsiveness
            const minDim = Math.min(width, height);
            blobs[0].r = minDim * 0.8;
            blobs[1].r = minDim * 0.9;
            blobs[2].r = minDim * 1.0;
            blobs[3].r = minDim * 0.6; // follower
            blobs[4].r = minDim * 0.4; // white glow
        }

        function onMouseMove(e) {
            targetMouse.x = e.clientX;
            targetMouse.y = e.clientY;

            // Subtle Parallax effect for the central text
            const xOffset = (targetMouse.x / width - 0.5) * 50;
            const yOffset = (targetMouse.y / height - 0.5) * 50;

            gsap.to(textContent, {
                x: -xOffset,
                y: -yOffset,
                duration: 2,
                ease: 'power3.out'
            });
        }

        function animateAmbient(blob, rangeScale) {
            // Randomly wander around a certain range
            gsap.to(blob, {
                x: () => blob.x + (Math.random() - 0.5) * width * rangeScale,
                y: () => blob.y + (Math.random() - 0.5) * height * rangeScale,
                duration: () => 5 + Math.random() * 5,
                ease: 'sine.inOut',
                onComplete: () => animateAmbient(blob, rangeScale) // loop
            });
        }

        function render() {
            // Clear canvas
            ctx.clearRect(0, 0, width, height);

            // Draw dark background base
            ctx.fillStyle = '#030508';
            ctx.fillRect(0, 0, width, height);

            // Smooth linear interpolation (lerp) for the mouse position
            mouse.x += (targetMouse.x - mouse.x) * 0.05;
            mouse.y += (targetMouse.y - mouse.y) * 0.05;

            // Update follower blobs with elastic lag
            blobs[3].x += (mouse.x - blobs[3].x) * 0.04;
            blobs[3].y += (mouse.y - blobs[3].y) * 0.04;

            blobs[4].x += (mouse.x - blobs[4].x) * 0.08;
            blobs[4].y += (mouse.y - blobs[4].y) * 0.08;

            // Set blending mode for liquid light effect
            ctx.globalCompositeOperation = 'screen';

            blobs.forEach(blob => {
                const gradient = ctx.createRadialGradient(blob.x, blob.y, 0, blob.x, blob.y, blob.r);
                
                // Map out the opacity curve to simulate a gaussian blur/glow
                gradient.addColorStop(0, `rgba(${blob.rColor}, ${blob.gColor}, ${blob.bColor}, ${blob.aBase})`);
                gradient.addColorStop(0.3, `rgba(${blob.rColor}, ${blob.gColor}, ${blob.bColor}, ${blob.aBase * 0.7})`);
                gradient.addColorStop(0.7, `rgba(${blob.rColor}, ${blob.gColor}, ${blob.bColor}, ${blob.aBase * 0.2})`);
                gradient.addColorStop(1, `rgba(${blob.rColor}, ${blob.gColor}, ${blob.bColor}, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(blob.x, blob.y, blob.r, 0, Math.PI * 2);
                ctx.fill();
            });

            // Reset blend mode
            ctx.globalCompositeOperation = 'source-over';
        }

        init();
    </script>
</body>
</html>
